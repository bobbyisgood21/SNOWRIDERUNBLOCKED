<!DOCTYPE html>
<html>
<head>
    <title>Bobby's Unblocked Games</title>
    <style>
        body { background: #050505; color: #00ffcc; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        h1 { text-shadow: 0 0 15px #00ffcc; font-size: 40px; margin-bottom: 10px; }
        
        /* The Game Box */
        .game-container { position: relative; display: inline-block; border: 4px solid #00ffcc; border-radius: 20px; overflow: hidden; box-shadow: 0 0 40px #00ffcc; background: #000; }
        iframe { width: 960px; height: 600px; border: none; }

        /* The Stats Dashboard */
        .dashboard { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .stat-card { background: #111; border: 1px solid #333; padding: 15px; border-radius: 10px; min-width: 150px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #fff; }
        .stat-label { font-size: 12px; color: #888; text-transform: uppercase; }
        .warning { color: #ff4444; border-color: #ff4444; }
    </style>
</head>
<body>

    <h1>SNOW RIDER 3D: UNBLOCKED</h1>
    
    <div class="game-container">
        <iframe src="https://images-opensocial.googleusercontent.com/gadgets/ifr?url=https://cdn.jsdelivr.net/gh/sk160/gjv3@main/sr3d/sr3d.xml"></iframe>
    </div>

    <div class="dashboard">
        <div class="stat-card">
            <div class="stat-label">Estimated Earnings</div>
            <div class="stat-value">$0.00</div>
            <p style="font-size: 10px;">(Ad-Sense: Inactive)</p>
        </div>
        <div class="stat-card warning">
            <div class="stat-label">Copyright Claims</div>
            <div class="stat-value">0</div>
            <p style="font-size: 10px;">Status: Safe</p>
        </div>
        <div class="stat-card">
            <div class="stat-label">Hack Club Tickets</div>
            <div class="stat-value">1</div>
            <p style="font-size: 10px;">Path 1: Verified</p>
        </div>
    </div>

    <p style="color: #444; margin-top: 20px;">Notice: This site is for educational purposes only. Copyright belongs to GameDistribution.</p>

</body>
</html>
