<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNBLOCKED GAMES PORTAL</title>
    <style>
        body { 
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: #ffffff; 
            text-align: center; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 { 
            font-size: 45px;
            letter-spacing: 5px;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            filter: drop-shadow(0 0 15px rgba(0, 255, 204, 0.6));
        }

        .game-wrapper {
            background: rgba(22, 27, 34, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid #00ffcc;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.2);
            width: 90vw;
            max-width: 960px;
        }

        iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            border: 1px solid #333;
            background: #000;
        }

        .gui-footer {
            margin-top: 15px;
            display: flex;
            justify-content: space-around;
            padding: 5px;
        }

        .status-pill {
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>UNBLOCKED GAMES</h1>

    <div class="game-wrapper">
        <iframe 
            src="https://images-opensocial.googleusercontent.com/gadgets/ifr?url=https://s3.amazonaws.com/cdn.mathgames.com/snow-rider-3d/index.html" 
            sandbox="allow-scripts allow-same-origin allow-forms"
            allowfullscreen="true">
        </iframe>
        
        <div class="gui-footer">
            <div class="status-pill">Mirror: Active</div>
            <div class="status-pill">Anti-Popup: ON</div>
            <div class="status-pill">Verified Proxy</div>
        </div>
    </div>

</body>
</html>
