<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNBLOCKED GAMES PORTAL</title>
    <style>
        /* Pro-Gaming Aesthetic */
        body { 
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: #ffffff; 
            text-align: center; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden; /* Keeps the page clean */
        }

        /* The Animated Title Area */
        header {
            margin-bottom: 20px;
            z-index: 10;
        }

        h1 { 
            font-size: 50px; 
            letter-spacing: 5px;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            filter: drop-shadow(0 0 15px rgba(0, 255, 204, 0.6));
        }

        /* The Main Game Box (The GUI) */
        .game-wrapper {
            position: relative;
            background: rgba(22, 27, 34, 0.85);
            backdrop-filter: blur(15px);
            border: 2px solid #00ffcc;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 0 60px rgba(0, 255, 204, 0.2), inset 0 0 20px rgba(0, 255, 204, 0.1);
            width: 90vw;
            max-width: 1000px;
            transition: 0.3s;
        }

        /* The Actual Game Window */
        iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            border: 1px solid #333;
            background: #000;
        }

        /* Lower GUI Dashboard */
        .gui-footer {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            width: 100%;
            box-sizing: border-box;
        }

        .status-pill {
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #00ffcc;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* Fullscreen Prompt */
        .tip {
            margin-top: 20px;
            color: #484f58;
            font-size: 12px;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

    <header>
        <h1>UNBLOCKED GAMES</h1>
    </header>

    <div class="game-wrapper">
        <iframe src="https://images-opensocial.googleusercontent.com/gadgets/ifr?url=https://cdn.jsdelivr.net/gh/sk160/gjv3@main/sr3d/sr3d.xml" 
                allowfullscreen="true"></iframe>
        
        <div class="gui-footer">
            <div class="status-pill"><span class="dot"></span> System: Active</div>
            <div class="status-pill" style="border-color: #555; color: #888;">Proxy: Enabled</div>
            <div class="status-pill">V 1.0.8</div>
        </div>
    </div>

    <div class="tip">USE KEYBOARD TO PLAY • PRESS 'F' FOR FULLSCREEN</div>

</body>
</html>
